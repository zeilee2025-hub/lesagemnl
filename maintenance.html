<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Maintenance | LÉ SAGE MNL</title>

  <meta
    name="description"
    content="LÉ SAGE MNL is currently undergoing maintenance. We'll be back shortly."
  />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap"
    rel="stylesheet"
  >

  <style>
    :root {
      --bg: #0a0a0a;
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.55);
      --line: rgba(255, 255, 255, 0.08);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
    }

    body {
      position: relative;

      display: flex;
      align-items: center;
      justify-content: center;

      overflow: hidden;

      background: var(--bg);
      color: var(--text);

      font-family: 'Montserrat', sans-serif;
      text-align: center;
    }

    /* =========================
       BACKGROUND GLOW
    ========================= */

    body::before {
      content: "";

      position: absolute;
      inset: 0;

      background:
        radial-gradient(
          circle at top,
          rgba(255,255,255,0.06),
          transparent 40%
        );

      pointer-events: none;
    }

    /* =========================
       CONTAINER
    ========================= */

    .container {
      position: relative;
      z-index: 2;

      width: 100%;
      max-width: 520px;

      padding:
        40px
        28px;
    }

    /* =========================
       BRAND
    ========================= */

    .brand {
      margin-bottom: 36px;

      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.35em;

      opacity: 0.75;
    }

    /* =========================
       TITLE
    ========================= */

    h1 {
      margin-bottom: 16px;

      font-size: clamp(32px, 6vw, 52px);
      font-weight: 600;
      letter-spacing: 0.08em;
      line-height: 0.95;
    }

    /* =========================
       TEXT
    ========================= */

    p {
      color: var(--muted);

      font-size: 14px;
      line-height: 1.8;
      letter-spacing: 0.04em;
    }

    /* =========================
       DIVIDER
    ========================= */

    .divider {
      width: 72px;
      height: 1px;

      margin:
        32px
        auto;

      background: var(--line);
    }

    /* =========================
       LOADER
    ========================= */

    .loader {
      display: flex;
      justify-content: center;
      gap: 8px;

      margin-top: 32px;
    }

    .loader span {
      width: 6px;
      height: 6px;

      border-radius: 999px;
      background: rgba(255,255,255,0.75);

      animation: pulse 1.2s infinite ease-in-out;
    }

    .loader span:nth-child(2) {
      animation-delay: 0.15s;
    }

    .loader span:nth-child(3) {
      animation-delay: 0.3s;
    }

    @keyframes pulse {
      0%,
      80%,
      100% {
        opacity: 0.25;
        transform: scale(0.9);
      }

      40% {
        opacity: 1;
        transform: scale(1.15);
      }
    }

    /* =========================
       MOBILE
    ========================= */

    @media (max-width: 480px) {
      .container {
        padding:
          32px
          24px;
      }

      .brand {
        margin-bottom: 28px;
      }

      p {
        font-size: 13px;
      }
    }
  </style>
</head>

<body>
  <main class="container">

    <div class="brand">
      LÉ SAGE MNL
    </div>

    <h1>
      WE'LL BE BACK
    </h1>

    <p>
      We're currently refining the experience<br>
      and updating the store.
    </p>

    <div class="divider"></div>

    <p>
      Thank you for your patience.
    </p>

    <div class="loader">
      <span></span>
      <span></span>
      <span></span>
    </div>

  </main>
</body>
</html>
