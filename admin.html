<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    Admin — LÉ SAGE MNL
  </title>

  <!-- BASE -->
  <link
    rel="stylesheet"
    href="css/base.css"
  />

  <!-- COMPONENTS -->
  <link
    rel="stylesheet"
    href="css/components/admin-orders.css"
  />

  <link
    rel="stylesheet"
    href="css/components/admin-stats.css"
  />

  <!-- PAGE -->
  <link
    rel="stylesheet"
    href="css/pages/admin.css"
  />

</head>

<body>

  <main class="admin">

    <!-- ==========================
         ADMIN HEADER
    ========================== -->
    <header class="admin__header">

      <div class="admin__header-content">

        <div class="admin__header-top">

          <div>

            <h1 class="admin__title">
              Dashboard
            </h1>

            <p class="admin__subtitle">
              Manage orders and monitor store activity
            </p>

          </div>


          <!-- ==========================
               ADMIN LOGOUT
          ========================== -->

          <button
            id="admin-logout-btn"
            class="admin__logout-btn"
          >

            Logout

          </button>

        </div>

      </div>

    </header>


    <!-- ==========================
         ADMIN STATS
    ========================== -->
    <section class="admin-stats">

      <div class="admin-stat">

        <p class="admin-stat__label">
          Total Revenue
        </p>

        <h2
          class="admin-stat__value"
          id="stat-revenue"
        >
          ₱0
        </h2>

      </div>


      <div class="admin-stat">

        <p class="admin-stat__label">
          Total Orders
        </p>

        <h2
          class="admin-stat__value"
          id="stat-total"
        >
          0
        </h2>

      </div>


      <div class="admin-stat">

        <p class="admin-stat__label">
          Pending
        </p>

        <h2
          class="admin-stat__value"
          id="stat-pending"
        >
          0
        </h2>

      </div>


      <div class="admin-stat">

        <p class="admin-stat__label">
          Paid Orders
        </p>

        <h2
          class="admin-stat__value"
          id="stat-paid"
        >
          0
        </h2>

      </div>

    </section>


    <!-- ==========================
         ADMIN FILTERS
    ========================== -->
    <section class="admin__filters">

      <button
        class="admin__filter-btn active"
        data-filter="ALL"
      >
        All
      </button>


      <button
        class="admin__filter-btn"
        data-filter="PENDING_PAYMENT"
      >
        Pending
      </button>


      <button
        class="admin__filter-btn"
        data-filter="PAID"
      >
        Paid
      </button>


      <button
        class="admin__filter-btn"
        data-filter="SHIPPED"
      >
        Shipped
      </button>


      <button
        class="admin__filter-btn"
        data-filter="COMPLETED"
      >
        Completed
      </button>

    </section>


    <!-- ==========================
         ADMIN SEARCH
    ========================== -->
    <section class="admin__search">

      <input
        type="text"
        id="order-search"
        class="admin__search-input"
        placeholder="Search order (LSM-XXXX)"
      />

    </section>


    <!-- ==========================
         ADMIN ORDERS
    ========================== -->
    <section
      id="admin-orders"
      class="admin-orders"
    ></section>

  </main>


  <!-- JS -->
  <script
    type="module"
    src="js/pages/admin.js"
  ></script>

</body>

</html>
