<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    Admin Login
  </title>

  <link
    rel="stylesheet"
    href="./css/base.css"
  />

  <link
    rel="stylesheet"
    href="./css/pages/admin-login.css"
  />

</head>

<body class="admin-login-page">

  <main class="admin-login">

    <section
      class="admin-login__card"
      aria-labelledby="admin-login-title"
    >

      <div class="admin-login__header">

        <p class="admin-login__eyebrow">
          LÉ SAGE MNL / Admin Portal
        </p>

        <h1
          class="admin-login__title"
          id="admin-login-title"
        >
          Admin Login
        </h1>

        <p class="admin-login__text">
          Sign in with an authorized administrator account to manage orders.
        </p>

      </div>

      <div class="admin-login__form">

        <label
          class="admin-login__field"
          for="admin-email"
        >
          <span>Email</span>

          <input
            type="email"
            id="admin-email"
            class="admin-login__input"
            placeholder="Admin Email"
            autocomplete="email"
          />
        </label>

        <label
          class="admin-login__field"
          for="admin-password"
        >
          <span>Password</span>

          <input
            type="password"
            id="admin-password"
            class="admin-login__input"
            placeholder="Password"
            autocomplete="current-password"
          />
        </label>

        <p
          class="admin-login__error"
          id="admin-login-error"
          aria-live="polite"
        ></p>

        <button
          id="admin-login-btn"
          class="admin-login__button"
        >
          Login
        </button>

      </div>

    </section>

  </main>

  <script
    type="module"
    src="./js/pages/admin-login.js"
  ></script>

</body>

</html>
