<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Order Details | LÉ SAGE MNL</title>
  <meta name="description" content="View your order details, status, and tracking." />

  <!-- Core Styles -->
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/pages/order.css" />
</head>

<body>

  <!-- NAVBAR -->
  <div id="navbar"></div>

  <main class="order-page">

    <!-- =========================
         HEADER
    ========================= -->
    <header class="order-header">

      <div class="order-header-left">
        <a href="orders.html" class="back-link">
          &lt; Back to Orders
        </a>

        <div class="order-title-row">
          <div class="order-id" id="order-id">Order #—</div>
          <button class="copy-btn" id="copy-order-id">Copy</button>
        </div>

        <div class="order-date" id="order-date"></div>
      </div>

      <!-- STATUS -->
      <div id="order-status">
        STATUS
      </div>

    </header>

    <!-- =========================
         LAYOUT
    ========================= -->
    <section class="order-content">

      <!-- =========================
           LEFT COLUMN
      ========================= -->
      <div class="order-main">

        <!-- ITEMS -->
        <section class="card">
          <div class="card-title">Items</div>

          <div id="order-items"></div>
        </section>

        <!-- TIMELINE (NEW) -->
        <section id="order-timeline">
          <div class="card-title">Order Timeline</div>
          <div class="timeline" id="order-timeline-list"></div>
        </section>

        <!-- TRACKING -->
        <section id="tracking-section" class="card hidden">
          <div class="card-title">Tracking</div>

          <div class="shipping-info">

            <div class="info-row">
              <span class="label">Courier:</span>
              <span id="tracking-courier">J&T Express</span>
            </div>

            <div class="info-row">
              <span class="label">Tracking No:</span>
              <span id="tracking-number"></span>
            </div>

            <a
              href="#"
              target="_blank"
              id="tracking-link"
              class="btn-primary"
            >
              Track on J&T
            </a>

          </div>
        </section>

      </div>

      <!-- =========================
           RIGHT COLUMN
      ========================= -->
      <aside class="order-sidebar">

        <div class="card">

          <div class="card-title">
            Summary & Shipping
          </div>

          <!-- SUMMARY -->
          <div class="summary-section">

            <div class="summary-row">
              <span>Subtotal</span>
              <span id="summary-subtotal"></span>
            </div>

            <div class="summary-row">
              <span>Shipping</span>
              <span id="summary-shipping"></span>
            </div>

            <div class="summary-row total">
              <span>Total</span>
              <span id="summary-total"></span>
            </div>

            <div class="summary-row">
              <span>Payment</span>
              <span id="summary-payment"></span>
            </div>

          </div>

          <div class="divider"></div>

          <!-- SHIPPING -->
          <div class="shipping-info" id="shipping-info"></div>

          <div class="divider"></div>

          <!-- PAYMENT PROOF -->
          <button class="btn-primary hidden" id="proof-toggle">
            View Proof
          </button>

          <div id="proof-container" class="hidden"></div>

        </div>

      </aside>

    </section>

  </main>

  <!-- FOOTER -->
  <div id="footer"></div>

  <script type="module" src="js/pages/order.js"></script>

</body>
</html>
