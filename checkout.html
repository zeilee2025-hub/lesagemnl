<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    Checkout | LÉ SAGE MNL
  </title>

  <!-- STYLES -->
<link rel="stylesheet" href="./css/base.css" />

<link rel="stylesheet" href="./css/components/forms.css" />
<link rel="stylesheet" href="./css/components/payment.css" />
<link rel="stylesheet" href="./css/components/summary.css" />

<link rel="stylesheet" href="./css/pages/checkout.css" />
  

  <!-- LUCIDE -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>


<body class="checkout-page">

  <!-- =========================
       CHECKOUT HEADER
  ========================== -->

  <header class="checkout-header">

    <div class="checkout-header__container">

      <!-- LOGO -->
      <a
        href="./index.html"
        class="checkout-header__logo"
      >
        <img
          src="./assets/logo.png"
          alt="LÉ SAGE MNL Logo"
        />
      </a>


      <!-- CART -->
      <a
        href="./cart.html"
        class="checkout-header__cart"
      >

        <i data-lucide="shopping-bag"></i>

        <span
          id="cart-badge"
          class="checkout-header__badge"
        >
          0
        </span>

      </a>

    </div>

  </header>


  <!-- =========================
       MAIN
  ========================== -->

  <main class="checkout">

    <div class="checkout__container">


      <!-- =========================
           LEFT
      ========================== -->

      <section class="checkout__left">


        <!-- CONTACT -->
        <section class="checkout__section">

          <h2 class="checkout__title">
            Contact
          </h2>


          <input
            type="email"
            id="checkout-email"
            class="checkout__input"
            placeholder="Email"
          />


          <label class="checkout__checkbox">

            <input
              type="checkbox"
              id="checkout-marketing"
            />

            <span>
              Email me with news and offers
            </span>

          </label>

        </section>


        <!-- DELIVERY -->
        <section class="checkout__section">

          <h2 class="checkout__title">
            Delivery
          </h2>


          <!-- NAME -->
          <div class="checkout__row">

            <input
              type="text"
              id="checkout-first-name"
              class="checkout__input"
              placeholder="First name"
            />

            <input
              type="text"
              id="checkout-last-name"
              class="checkout__input"
              placeholder="Last name"
            />

          </div>


          <!-- PHONE -->
          <input
            type="text"
            id="checkout-phone"
            class="checkout__input"
            placeholder="Phone"
          />


          <!-- ADDRESS -->
          <div class="checkout__field">

            <label class="checkout__label">
              Address
            </label>

            <input
              type="text"
              id="checkout-address"
              class="checkout__input"
              placeholder="Street address (include barangay)"
            />

          </div>


          <!-- APARTMENT -->
          <input
            type="text"
            id="checkout-apartment"
            class="checkout__input"
            placeholder="Apartment, suite, unit (optional)"
          />


          <!-- PROVINCE -->
          <div class="checkout__field checkout__field--relative">

            <label class="checkout__label">
              Province
            </label>

            <input
              type="text"
              id="checkout-province-input"
              class="checkout__input"
              placeholder="Search province..."
              autocomplete="off"
            />

            <div
              id="province-dropdown"
              class="checkout__dropdown"
            ></div>

          </div>


          <!-- CITY -->
          <div class="checkout__field">

            <label class="checkout__label">
              City / Municipality
            </label>


            <!-- DEFAULT -->
            <select
              id="checkout-city"
              class="checkout__input"
            >
              <option value="">
                Select City
              </option>
            </select>


            <!-- FALLBACK -->
            <button
              type="button"
              id="city-fallback-trigger"
              class="checkout__helper"
            >
              Can’t find your city?
            </button>


            <!-- MANUAL -->
            <input
              type="text"
              id="checkout-city-manual"
              class="checkout__input checkout__input--hidden"
              placeholder="Enter your city"
            />

          </div>


          <!-- POSTAL -->
          <div class="checkout__field">

            <label class="checkout__label">
              Postal Code
            </label>

            <input
              type="text"
              id="checkout-postal"
              class="checkout__input"
              placeholder="Postal code (e.g. 1800)"
            />

          </div>

        </section>


       <!-- PAYMENT -->
<section class="checkout__section">

  <h2 class="checkout__title">
    Payment
  </h2>

  <p class="checkout__payment-sub">
    All transactions are secure and encrypted.
  </p>


  <!-- PAYMENT METHODS -->
  <div class="payment-methods">


    <!-- PAYMONGO -->
    <button
      type="button"
      class="payment-card active"
      data-method="PAYMONGO"
    >

      <div class="payment-card__header">

        <span class="payment-card__title">
          Pay Now
        </span>

        <span class="payment-card__badge">
          Instant
        </span>

      </div>

      <div class="payment-card__body">

        <p class="payment-card__desc">
          Instant QR, cards, and e-wallets
        </p>

      </div>

    </button>


    <!-- LOCAL -->
    <button
      type="button"
      class="payment-card"
      data-method="LOCAL"
    >

      <div class="payment-card__header">

        <span class="payment-card__title">
          Secure Local Payment
        </span>

        <span class="payment-card__badge">
          Manual
        </span>

      </div>

      <div class="payment-card__body">

        <p class="payment-card__desc">
          GCash, GoTyme, and BPI transfers
        </p>

      </div>

    </button>

  </div>


  <!-- PAYMENT TRUST -->
  <div class="payment-unified">

    <div class="payment-unified__top">

      <span class="payment-unified__label">
        Accepted Payments
      </span>

      <div class="payment-unified__logos">

        <div class="pay-badge">
          <img
            src="./assets/payments/mastercard.png"
            alt="Mastercard"
          />
        </div>

        <div class="pay-badge">
          <img
            src="./assets/payments/visa.png"
            alt="Visa"
          />
        </div>

        <div class="pay-badge">
          <img
            src="./assets/payments/gotyme.png"
            alt="Gotyme"
          />
        </div>

         <div class="pay-badge">
          <img
            src="./assets/payments/bpi.png"
            alt="Bpi"
          />
        </div>

        <div class="pay-badge">
          <img
            src="./assets/payments/gcash.png"
            alt="Gcash"
          />
        </div>

        <div class="pay-badge">
          <img
            src="./assets/payments/maya.png"
            alt="Maya"
          />
        </div>

        <div class="pay-badge">
          <img
            src="./assets/payments/qrph.png"
            alt="QRPH"
          />
        </div>

        <div class="pay-badge">
          <img
            src="./assets/payments/shopeepay.png"
            alt="ShopeePay"
          />
        </div>

      </div>

    </div>


    <div class="payment-unified__bottom">

      <p class="payment-unified__text">
        Instant payments are securely processed via PayMongo.
      </p>

      </p>

    </div>

  </div>

</section>

</section>


<!-- =========================
     SUMMARY
========================== -->

<aside class="checkout__right">

  <div
    id="checkout-items"
    class="summary__items"
  ></div>

  <div
    id="checkout-summary"
  ></div>

</aside>

</div>

</main>


<!-- ICONS -->
<script>
  lucide.createIcons();
</script>


<!-- PAGE -->
<script
  type="module"
  src="./js/pages/checkout.js"
></script>

</body>
</html>
